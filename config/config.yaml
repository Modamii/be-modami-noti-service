# Notification service configuration (Viper)

app:
  name: "Modami chat"
  version: "1.0.0"
  environment: "development"
  debug: true
  port: 8089
  host: "localhost"
  swagger_host: "localhost:8089"
  shutdown_timeout: 30s
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  cors_origins:
    - "*"

mongodb:
  uri: "mongodb://localhost:27017/?directConnection=true"
  database: "modami-noti-service"
  timeout: 10s
  max_pool_size: 100
  min_pool_size: 0
  max_idle_time: 900s
  retry_writes: true
  read_concern: "majority"
  write_concern: "majority"
  enable_logging: true

redis:
  host: "localhost"
  port: 6379
  database: 0
  rate_limit_database: 5
  ttl: 259200s
  pool_size: 100
  pass: ""
  user_name: ""
  write_timeout: 600s
  read_timeout: 600s
  dial_timeout: 600s
  tls_config:
    insecure_skip_verify: true

kafka:
  broker_list: "localhost:9092"
  enable: true
  tls_enable: false
  partition: 1
  partitioner: "random"
  sasl_producer_username: ""
  sasl_producer_password: ""
  sasl_consumer_username: ""
  sasl_consumer_password: ""
  user_activated_topic_name: "modami.auth.user.activated"
  consumer_group: "user-service-group"
  client_id: "user-service"
  env: "local"

queue:
  ws_key: "notif:ws"
  push_key: "notif:push"

servers:
  api_addr: ":7070"
  ingest_addr: ":7071"
  gateway_addr: ":7072"

fcm:
  credentials_path: ""

centrifugo:
  api_url: "http://localhost:8000/api"
  api_key: ""      # set via CENTRIFUGO_API_KEY env var
  hmac_secret: ""  # set via CENTRIFUGO_HMAC_SECRET env var
  token_ttl: 3600

observability:
  service_name: "core-service"
  service_version: "1.0.0"
  environment: "development"
  log_level: "info"
  otlp_endpoint: ""
  otlp_insecure: true
