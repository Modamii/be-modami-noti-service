apiVersion: apps/v1
kind: Deployment
metadata:
  name: centrifugo
  namespace: techinsight-notifications
  labels:
    app: centrifugo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: centrifugo
  template:
    metadata:
      labels:
        app: centrifugo
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: centrifugo
          image: centrifugo/centrifugo:v5
          command: ["centrifugo"]
          args:
            - "--config=/centrifugo/config.json"
            - "--port=8000"
            - "--internal_port=9000"
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9000
              name: internal
          env:
            - name: CENTRIFUGO_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: CENTRIFUGO_HMAC_SECRET
            - name: CENTRIFUGO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: CENTRIFUGO_API_KEY
            - name: CENTRIFUGO_ADMIN_PASSWORD
              value: "admin"
            - name: CENTRIFUGO_ADMIN_SECRET
              value: "admin-secret"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: CACHE_REDIS_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /centrifugo
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: internal
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: internal
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: centrifugo-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: centrifugo-config
  namespace: techinsight-notifications
data:
  config.json: |
    {
      "token_hmac_secret_key": "${CENTRIFUGO_HMAC_SECRET}",
      "api_key": "${CENTRIFUGO_API_KEY}",
      "admin": true,
      "admin_password": "${CENTRIFUGO_ADMIN_PASSWORD}",
      "admin_secret": "${CENTRIFUGO_ADMIN_SECRET}",
      "engine": "redis",
      "redis_address": "redis:6379",
      "redis_password": "${REDIS_PASSWORD}",
      "namespaces": [
        {
          "name": "notifications",
          "presence": true,
          "history_size": 50,
          "history_ttl": "300s",
          "recover": true,
          "allow_subscribe_for_client": true
        }
      ],
      "allowed_origins": ["*"],
      "client_channel_limit": 128,
      "log_level": "info"
    }
---
apiVersion: v1
kind: Service
metadata:
  name: centrifugo
  namespace: techinsight-notifications
spec:
  selector:
    app: centrifugo
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: internal
      port: 9000
      targetPort: 9000
      protocol: TCP
  type: ClusterIP
