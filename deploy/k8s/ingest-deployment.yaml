apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-ingest
  namespace: techinsight-notifications
  labels:
    app: notification-ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-ingest
  template:
    metadata:
      labels:
        app: notification-ingest
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ingest
          image: notification-service/ingest:latest
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-ingest
  namespace: techinsight-notifications
spec:
  selector:
    app: notification-ingest
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
  type: ClusterIP
