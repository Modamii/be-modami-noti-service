apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker-dispatch
  namespace: techinsight-notifications
  labels:
    app: notification-worker-dispatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-worker-dispatch
  template:
    metadata:
      labels:
        app: notification-worker-dispatch
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker-dispatch
          image: notification-service/worker-dispatch:latest
          ports:
            - containerPort: 7073
              name: health
          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
