apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: techinsight-notifications
  labels:
    app: notification-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: notification-service/api:latest
          ports:
            - containerPort: 7070
              name: http
          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: techinsight-notifications
spec:
  selector:
    app: notification-api
  ports:
    - port: 7070
      targetPort: 7070
      protocol: TCP
  type: ClusterIP
