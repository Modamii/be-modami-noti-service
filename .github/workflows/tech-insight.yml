# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: TechInsight API CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: NOTIFICATION_SERVICE
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.0"

      - name: Configure GitLab auth for Go modules
        run: |
          echo "machine gitlab.com" > ~/.netrc
          echo "login ${{ secrets.GITLAB_USERNAME }}" >> ~/.netrc
          echo "password ${{ secrets.GITLAB_TOKEN }}" >> ~/.netrc
          chmod 600 ~/.netrc

          git config --global url."https://${{ secrets.GITLAB_USERNAME }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/".insteadOf "https://gitlab.com/"

          go env -w GOPRIVATE=gitlab.com/lifegoeson-libs/*
          go env -w GONOSUMDB=gitlab.com/lifegoeson-libs/*
          go env -w GONOPROXY=gitlab.com/lifegoeson-libs/*

      - name: Build
        run: go build -v ./...

  security-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Trivy Installation
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy FS Scan
        run: trivy fs --format table -o fs-report.json .

      - name: Gitleaks Installation
        run: sudo apt install gitleaks -y
      - name: Gitleaks - Secret Scan (Detailed)
        run: |
          # Scan with detailed output
          gitleaks detect \
            --source . \
            --report-path gitleaks-report.json \
            --report-format json \
            --verbose \
            --no-git || EXIT_CODE=$?

          # Show human-readable output
          echo "=========================================="
          echo "GITLEAKS SECRET SCAN RESULTS"
          echo "=========================================="

          if [ -f gitleaks-report.json ]; then
            # Parse and display findings
            cat gitleaks-report.json | jq -r '.[] |
              "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
              "LEAK FOUND!",
              "File: \(.File)",
              "Line: \(.StartLine)",
              "Secret: \(.Secret)",
              "Rule: \(.RuleID)",
              "Match: \(.Match)",
              "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            '
          fi

          # Exit with original code
          exit ${EXIT_CODE:-0}

  build_and_push_docker_image:
    runs-on: ubuntu-latest
    environment: NOTIFICATION_SERVICE
    needs: [build, security-check]
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set Image Tag
        id: set_tag
        run: |
          IMAGE_TAG=v1.0.$(git rev-parse --short HEAD)
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $IMAGE_TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            gitlab_username=${{ secrets.GITLAB_USERNAME }}
            gitlab_token=${{ secrets.GITLAB_TOKEN }}
          tags: |
            lifegoeson34/techinsight-notification-service:latest
            lifegoeson34/techinsight-notification-service:${{ steps.set_tag.outputs.tag }}
