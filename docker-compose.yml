version: "3.9"

services:
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: centrifugo
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8000:8000"
      - "10000:10000"
    volumes:
      - ./deploy/centrifugo/config.local.json:/centrifugo/config.json:ro
    environment:
      # Local-only defaults; replace in real environments
      CENTRIFUGO_HMAC_SECRET: "local-dev-token-secret"
      CENTRIFUGO_API_KEY: "CHANGE_ME_API_KEY"
      CENTRIFUGO_ADMIN_PASSWORD: "CHANGE_ME_ADMIN_PASSWORD"
      CENTRIFUGO_ADMIN_SECRET: "CHANGE_ME_ADMIN_SECRET"
    restart: unless-stopped

