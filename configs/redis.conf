# =============================================================================
# TechInsight Redis Configuration
# =============================================================================

# Network and Security
bind 127.0.0.1
port 6379
protected-mode yes
requirepass password123

# General Settings
timeout 300
tcp-keepalive 300
tcp-backlog 511

# Memory Management
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# AOF (Append Only File) for better durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Client Management
maxclients 10000

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency Monitoring
latency-monitor-threshold 100

# Event Notification
notify-keyspace-events Ex

# Hash Configuration
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List Configuration
list-max-ziplist-size -2
list-compress-depth 0

# Set Configuration
set-max-intset-entries 512

# Sorted Set Configuration
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog Configuration
hll-sparse-max-bytes 3000

# Streams Configuration
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active Rehashing
activerehashing yes

# Client Output Buffer Limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client Query Buffer Limit
client-query-buffer-limit 1gb

# Protocol Buffer Limit
proto-max-bulk-len 512mb

# Replica Configuration
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command EVAL ""
rename-command DEBUG ""
rename-command CONFIG ""

# Lua Scripting
lua-time-limit 5000

# Cluster Configuration (disabled for single instance)
# cluster-enabled no

# Slow Log for Performance Monitoring
slowlog-log-slower-than 10000
slowlog-max-len 128

# Memory Usage Optimization for TechInsight API
# Database 0: General cache (articles, categories, etc.)
# Database 1: User sessions
# Database 2: Rate limiting
# Database 3: Real-time analytics
# Database 4: Search cache
# Database 5: File upload cache

# Key Expiration Settings
# Session keys: 24 hours (86400 seconds)
# Cache keys: 1 hour (3600 seconds)
# Rate limit keys: 1 minute (60 seconds)
# Temporary keys: 15 minutes (900 seconds)

# Performance Tuning
hz 10
dynamic-hz yes

# Memory Defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# Jemalloc Configuration
jemalloc-bg-thread yes

# IO Threads (Redis 6.0+)
io-threads 4
io-threads-do-reads yes

# TLS Configuration (disabled for development)
# tls-port 0
# tls-cert-file redis.crt
# tls-key-file redis.key
# tls-ca-cert-file ca.crt

# Module Loading (if needed)
# loadmodule /path/to/module.so

# Custom Configuration for TechInsight API
# These settings are optimized for:
# - High-frequency article reads
# - User session management
# - API rate limiting
# - Real-time notifications
# - Search result caching 