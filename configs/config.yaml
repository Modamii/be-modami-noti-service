# Notification service configuration (Viper)

app:
  name: "notification-service"
  environment: "development"
  debug: true
  cors_origins:
    - "*"

database:
  mongodb:
    uri: "mongodb://localhost:27017"
    database: "notifications"

cache:
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0

kafka:
  brokers:
    - "localhost:9092"
  consumer_group_id: "notification-service-group"
  notification_topic: "notification.events"

queue:
  ws_key: "notif:ws"
  push_key: "notif:push"

servers:
  api_addr: ":8080"
  ingest_addr: ":8082"

fcm:
  credentials_path: ""

centrifugo:
  api_url: "http://localhost:8000/api"
  api_key: "centrifugo-api-key"
  hmac_secret: "centrifugo-hmac-secret"
  token_ttl: 3600

logging:
  level: "info"
